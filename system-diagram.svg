<svg width="1200" height="780" viewBox="0 0 1200 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="780" fill="#FAFAF7"/>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5B6470"/>
    </marker>
  </defs>

  <text x="80" y="72" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#17202A">
    Agentic RAG System Overview
  </text>
  <text x="80" y="104" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5B6470">
    Local PDF processing, hybrid retrieval, LangGraph orchestration, and grounded answer generation
  </text>

  <rect x="72" y="150" width="496" height="520" rx="28" fill="#F1F4F8" stroke="#D6DCE5"/>
  <text x="104" y="195" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#17202A">
    Offline Knowledge Build
  </text>

  <rect x="104" y="226" width="432" height="62" rx="20" fill="#FFFFFF" stroke="#C9D2DC" filter="url(#shadow)"/>
  <text x="320" y="264" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#17202A">
    Policy Manual PDF
  </text>

  <rect x="104" y="328" width="432" height="72" rx="20" fill="#FFFFFF" stroke="#C9D2DC" filter="url(#shadow)"/>
  <text x="320" y="360" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#17202A">
    Page Extraction + Cleaning
  </text>
  <text x="320" y="384" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B6470">
    remove headers, footers, TOC noise
  </text>

  <rect x="104" y="440" width="432" height="72" rx="20" fill="#FFFFFF" stroke="#C9D2DC" filter="url(#shadow)"/>
  <text x="320" y="472" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#17202A">
    Heading/List-Aware Chunking
  </text>
  <text x="320" y="496" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B6470">
    recursive section-based chunk creation
  </text>

  <rect x="104" y="552" width="432" height="82" rx="20" fill="#FFFFFF" stroke="#C9D2DC" filter="url(#shadow)"/>
  <text x="320" y="584" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#17202A">
    Embeddings + Local Index
  </text>
  <text x="320" y="608" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B6470">
    e5-base-v2 embeddings
  </text>
  <text x="320" y="628" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B6470">
    Chroma vector store + JSON artifacts
  </text>

  <line x1="320" y1="288" x2="320" y2="328" stroke="#5B6470" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="320" y1="400" x2="320" y2="440" stroke="#5B6470" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="320" y1="512" x2="320" y2="552" stroke="#5B6470" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="632" y="150" width="496" height="520" rx="28" fill="#F5F2EB" stroke="#DED6C9"/>
  <text x="664" y="195" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#17202A">
    Online Question Answering
  </text>

  <rect x="664" y="226" width="432" height="62" rx="20" fill="#FFFFFF" stroke="#D7CFC1" filter="url(#shadow)"/>
  <text x="880" y="264" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#17202A">
    User Question
  </text>

  <rect x="664" y="328" width="432" height="82" rx="20" fill="#FFFFFF" stroke="#D7CFC1" filter="url(#shadow)"/>
  <text x="880" y="360" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#17202A">
    LangGraph Agent Flow
  </text>
  <text x="880" y="384" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B6470">
    classify, follow-up rewrite, smalltalk route
  </text>

  <rect x="664" y="450" width="432" height="92" rx="20" fill="#FFFFFF" stroke="#D7CFC1" filter="url(#shadow)"/>
  <text x="880" y="482" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#17202A">
    Hybrid Retrieval
  </text>
  <text x="880" y="506" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B6470">
    Chroma dense retrieval + BM25
  </text>
  <text x="880" y="526" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B6470">
    reciprocal rank fusion + reranker
  </text>

  <rect x="664" y="582" width="432" height="88" rx="20" fill="#FFFFFF" stroke="#D7CFC1" filter="url(#shadow)"/>
  <text x="880" y="614" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#17202A">
    Local Grounded Answer
  </text>
  <text x="880" y="638" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B6470">
    Qwen generation + verification
  </text>
  <text x="880" y="658" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B6470">
    extractive fallback if needed
  </text>

  <line x1="880" y1="288" x2="880" y2="328" stroke="#5B6470" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="880" y1="410" x2="880" y2="450" stroke="#5B6470" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="880" y1="542" x2="880" y2="582" stroke="#5B6470" stroke-width="3" marker-end="url(#arrow)"/>

  <path d="M536 593 C608 593, 592 496, 664 496" stroke="#5B6470" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="598" y="478" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B6470">
    indexed chunks
  </text>

  <rect x="80" y="706" width="1040" height="40" rx="20" fill="#FFFFFF" stroke="#D6DCE5"/>
  <text x="600" y="731" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B6470">
    Fully local pipeline: preprocessing, retrieval, reranking, and answer generation run without external API calls
  </text>
</svg>
